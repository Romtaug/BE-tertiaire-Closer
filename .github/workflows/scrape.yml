name: base-be-tertiaire

on:
  workflow_dispatch:
    inputs:
      dep:
        description: "Departement a limiter (ex: 69). Vide = France entiere."
        default: ""
        required: false
      skip_enrich:
        description: "true = sans enrichissement SIRENE/BODACC/sites (plus rapide)"
        default: "false"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.dep }}" ]; then
            ARGS="$ARGS --dep ${{ github.event.inputs.dep }}"
          fi
          if [ "${{ github.event.inputs.skip_enrich }}" = "true" ]; then
            ARGS="$ARGS --skip-enrich"
          fi
          python annuaire_be_v2.py $ARGS
      - name: Upload resultats
        uses: actions/upload-artifact@v4
        with:
          name: base-be-tertiaire-${{ github.run_number }}
          path: |
            base_be_tertiaire.xlsx
            base_be_max_national.csv
            base_be_max_aura.csv
            base_be_max_69.csv
            run_summary.json
          if-no-files-found: warn
          retention-days: 90
